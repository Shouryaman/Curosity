# Fly.io: https://fly.io/docs/languages-and-frameworks/dockerfile/
# Run: fly launch --copy-config   then   fly secrets set OPENAI_API_KEY=...

app = "curosity"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 1
